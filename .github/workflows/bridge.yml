name: Bridge bot scraper V2

on:
  repository_dispatch:
    types: [bridgectl_v2]
  workflow_dispatch:
    inputs:
      data:
        description: 'Full JSON payload ({"urls":["..."],"chat_id":"...","mode":"single|collection"})'
        required: false
        type: string

permissions:
  contents: read

jobs:
  bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
      GH_REPO_OWNER_AND_NAME: ${{ secrets.GH_REPO_OWNER_AND_NAME }}
      STORAGETO_API_KEY: ${{ secrets.STORAGETO_API_KEY }}
      # Single top-level payload string — avoids nested expression resolution bug
      PAYLOAD_DATA: ${{ github.event.client_payload.data || inputs.data || '{}' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build storageto CLI from source
        run: |
          set -eu
          sudo apt-get update -qq
          sudo apt-get install -y jq
          go version
          git clone --depth 1 https://github.com/storageto/cli.git /tmp/storageto-cli
          cd /tmp/storageto-cli
          go build -o /usr/local/bin/storageto ./cmd/storageto
          storageto version

      - name: Parse payload & validate
        id: parse
        run: |
          set -eu
          echo "--- Raw PAYLOAD_DATA ---"
          echo "$PAYLOAD_DATA"
          echo "--- End raw payload ---"

          # Write payload to file for jq parsing
          echo "$PAYLOAD_DATA" > /tmp/payload.json

          # Extract fields using jq
          URL_COUNT=$(jq '.urls | length' /tmp/payload.json)
          CHAT_ID=$(jq -r '.chat_id' /tmp/payload.json)
          MODE=$(jq -r '.mode // "single"' /tmp/payload.json)

          # Explicit validation: print counts to confirm non-empty
          echo "Total URLs: ${URL_COUNT}"
          echo "Chat ID: ${CHAT_ID}"
          echo "Mode: ${MODE}"

          if [ "$URL_COUNT" -eq 0 ]; then
            echo "::error::No URLs found in payload"
            exit 1
          fi

          if [ -z "$CHAT_ID" ] || [ "$CHAT_ID" = "null" ]; then
            echo "::error::Missing chat_id in payload"
            exit 1
          fi

          # Export for downstream steps
          echo "url_count=${URL_COUNT}" >> "$GITHUB_OUTPUT"
          echo "chat_id=${CHAT_ID}" >> "$GITHUB_OUTPUT"
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"

      - name: Execute bridge transfer
        id: transfer
        run: |
          set -eu
          chmod +x scripts/transfer.sh
          bash scripts/transfer.sh /tmp/payload.json

      - name: Post-process & deliver results to Telegram
        id: postprocess
        run: |
          set -eu
          node scripts/post_process.cjs /tmp/payload.json /tmp/results.json

      - name: Notify on error
        if: failure()
        env:
          PAYLOAD_CHAT_ID: ${{ steps.parse.outputs.chat_id || 'unknown' }}
        run: |
          BOT_TOKEN="$TELEGRAM_BOT_TOKEN"
          MSG="❌ Bridge job failed. Check run: https://github.com/${GH_REPO_OWNER_AND_NAME}/actions/runs/${{ github.run_id }}"
          curl -fsS "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${PAYLOAD_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            -d parse_mode=HTML || true
