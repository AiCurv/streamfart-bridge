name: Bridge bot scraper

on:
  repository_dispatch:
    types: [bridgectl_v2]
  workflow_dispatch:
    inputs:
      url:
        description: 'Test URL'
        required: false
        type: string

permissions:
  contents: read

jobs:
  bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
      GH_REPO_OWNER_AND_NAME: ${{ secrets.GH_REPO_OWNER_AND_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq + storageto CLI
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq
          git clone --depth 1 https://github.com/storageto/cli.git /tmp/storageto-cli
          cd /tmp/storageto-cli
          go build -o /usr/local/bin/storageto ./cmd/storageto
          storageto version

      - name: Show job info
        env:
          PAYLOAD_URLS: ${{ toJSON(github.event.client_payload.urls) }}
          PAYLOAD_CHAT_ID: ${{ github.event.client_payload.chat_id }}
        run: |
          echo "URLs: $PAYLOAD_URLS"
          echo "Chat: $PAYLOAD_CHAT_ID"

      - name: Download files
        id: download
        env:
          PAYLOAD_MODE: ${{ github.event.client_payload.mode }}
          PAYLOAD_URLS: ${{ toJSON(github.event.client_payload.urls) }}
        run: |
          set -eu
          echo "$PAYLOAD_URLS" > /tmp/urls.json
          cat /tmp/urls.json
          N=$(jq 'length' /tmp/urls.json)
          echo "Total URLs: $N"
          mkdir -p /tmp/dl
          cd /tmp/dl

          i=0
          while [ "$i" -lt "$N" ]; do
            URL=$(jq -r ".[$i]" /tmp/urls.json)
            echo "==> [$((i+1))/$N] $URL"
            OUTNAME="file_$i.bin"

            if echo "$URL" | grep -qE '^https?://storage\.to/'; then
              ID=$(echo "$URL" | sed -E 's#^https?://storage\.to/(r/)?##; s#\?.*##; s#/.*##')
              echo "storage.to id=$ID"
              curl -fsSL -o "$OUTNAME" "https://storage.to/r/$ID" || {
                echo "direct /r/ failed, scraping page"
                curl -fsSL "$URL" \
                  | grep -oE 'https://cdn\.storage\.to/[^"]*\?[^"]+' \
                  | head -1 \
                  | xargs -I{} curl -fsSL -o "$OUTNAME" "{}"
              }
            elif echo "$URL" | grep -qE '^https?://pixeldrain\.(com|dev)/'; then
              if echo "$URL" | grep -qE '/api/file/'; then
                curl -fsSL -o "$OUTNAME" "$URL"
              else
                ID=$(echo "$URL" | sed -E 's#^https?://pixeldrain\.(com|dev)/##; s#\?.*##; s#/.*##')
                echo "pixeldrain id=$ID"
                curl -fsSL -o "$OUTNAME" "https://pixeldrain.com/api/file/${ID}?download"
              fi
            else
              curl -fsSL -o "$OUTNAME" "$URL"
            fi

            ls -lh "$OUTNAME" 2>/dev/null || echo "WARN: $OUTNAME missing"
            i=$((i+1))
          done

          echo "--- Final files ---"
          ls -lh /tmp/dl/

      - name: Upload to storage.to
        id: upload
        working-directory: /tmp/dl
        run: |
          set -eu
          find . -maxdepth 1 -type f -size 0 -delete || true
          FILES=$(ls -1)
          echo "Files to upload: $FILES"
          if [ -z "$FILES" ]; then
            echo "::error::No files downloaded"
            exit 1
          fi
          storageto upload --json $FILES > /tmp/result.json
          echo "--- storageto result ---"
          cat /tmp/result.json
          jq . /tmp/result.json

      - name: Send result to Telegram
        env:
          RESULT: /tmp/result.json
          PAYLOAD_CHAT_ID: ${{ github.event.client_payload.chat_id }}
        run: |
          set -eu
          CHAT_ID="$PAYLOAD_CHAT_ID"
          BOT_TOKEN="$TELEGRAM_BOT_TOKEN"

          IS_COLL=$(jq -r '.is_collection' "$RESULT")
          if [ "$IS_COLL" = "true" ]; then
            RAW_URL=$(jq -r '.collection_info.raw_url' "$RESULT")
            PUBLIC_URL=$(jq -r '.collection_info.url' "$RESULT")
            EXPIRES=$(jq -r '.collection_info.expires_at' "$RESULT")
            M3U_PATH=/tmp/playlist.m3u
            printf '#EXTM3U\n' > "$M3U_PATH"
            jq -r '.collection_info.files[] | "#EXTINF:-1," + .name + "\n" + .raw_url' "$RESULT" >> "$M3U_PATH"
            cat "$M3U_PATH"
            MSG="Collection uploaded!\n\nLink: ${PUBLIC_URL}\nM3U: ${RAW_URL}\nExpires: ${EXPIRES}\n\nOpen the M3U in VLC / MX Player for sequential playback."
          else
            RAW_URL=$(jq -r '.file_info.raw_url' "$RESULT")
            PUBLIC_URL=$(jq -r '.file_info.url' "$RESULT")
            EXPIRES=$(jq -r '.file_info.expires_at' "$RESULT")
            MSG="Done!\n\nPage: ${PUBLIC_URL}\nDirect: ${RAW_URL}\nExpires: ${EXPIRES}"
          fi

          curl -fsS "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            -d parse_mode=HTML > /tmp/sent.json
          cat /tmp/sent.json

      - name: Notify on error
        if: failure()
        env:
          PAYLOAD_CHAT_ID: ${{ github.event.client_payload.chat_id }}
        run: |
          BOT_TOKEN="$TELEGRAM_BOT_TOKEN"
          MSG="Bridge job failed. Run: https://github.com/${GH_REPO_OWNER_AND_NAME}/actions/runs/${{ github.run_id }}"
          curl -fsS "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${PAYLOAD_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            -d parse_mode=HTML || true
